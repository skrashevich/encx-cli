openapi: 3.1.0
info:
  title: Encounter (en.cx) Game Engine API
  description: |
    API движка городских игр Encounter (en.cx), восстановленный из декомпиляции
    приложения EnApp v2.0.1 (net.necto68.enapp).

    Движок работает по HTTP (не HTTPS). Авторизация через session cookies.
    Все запросы должны содержать заголовок `User-Agent`.
  version: 1.0.0
  contact:
    name: Encounter Network
    url: https://en.cx

servers:
  - url: https://{domain}
    description: Encounter game server (default transport in client)
    variables:
      domain:
        default: quest.en.cx
        description: |
          Домен сервера Encounter. Допустимые паттерны:
          - *.en.cx (напр. quest.en.cx, tech.en.cx, nef.en.cx)
          - *.encounter.cx
          - *.encounter.ru
          - quest.ua (deprecated, мигрирован в {city}questua.en.cx;
            напр. kharkov.quest.ua -> kharkovquestua.en.cx)
        enum:
          - quest.en.cx
          - tech.en.cx
          - questua.en.cx
  - url: http://{domain}
    description: Encounter game server (legacy/plain HTTP)
    variables:
      domain:
        default: quest.en.cx
        description: |
          Домен сервера Encounter. Допустимые паттерны:
          - *.en.cx (напр. quest.en.cx, tech.en.cx, nef.en.cx)
          - *.encounter.cx
          - *.encounter.ru
          - quest.ua (deprecated, мигрирован в {city}questua.en.cx;
            напр. kharkov.quest.ua -> kharkovquestua.en.cx)
        enum:
          - quest.en.cx
          - tech.en.cx
          - questua.en.cx

tags:
  - name: auth
    description: Авторизация пользователя
  - name: game
    description: Игровые действия (получение состояния, отправка кодов)
  - name: discovery
    description: Обнаружение игр на домене
  - name: teams
    description: Управление командами
  - name: admin
    description: Административные операции (редактор игр)
  - name: anti-spam
    description: Антиспам/челлендж страницы Encounter

paths:
  /login/signin:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Авторизация пользователя
      description: |
        Авторизует пользователя на домене Encounter.
        Сессия сохраняется через Set-Cookie в ответе.
      parameters:
        - $ref: '#/components/parameters/JsonParam'
        - $ref: '#/components/parameters/LangParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              Login: player1
              Password: secret123
      responses:
        '200':
          description: Результат авторизации
          headers:
            Set-Cookie:
              description: Session cookies для последующих запросов
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                success:
                  summary: Успешная авторизация
                  value:
                    Error: 0
                    Message: ""
                wrong_credentials:
                  summary: Неверный логин/пароль
                  value:
                    Error: 2
                    Message: "Неправильный логин или пароль."
                bruteforce:
                  summary: Обнаружен брутфорс
                  value:
                    Error: 9
                    Message: "Действия пользователя расценены как брутфорс."

  /gameengines/encounter/play/{gameId}:
    post:
      operationId: gameAction
      tags: [game]
      summary: Выполнить игровое действие
      description: |
        Основной endpoint для всех игровых действий:
        - Получение текущего состояния игры (пустое тело)
        - Отправка кода уровня (LevelAction.Answer)
        - Отправка бонусного кода (BonusAction.Answer)

        Данные в теле запроса кодируются через `qs.stringify`
        (application/x-www-form-urlencoded).

        Cookies сессии передаются автоматически (`withCredentials: true`).
        Редиректы отключены (`maxRedirects: 0`).
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
        - $ref: '#/components/parameters/JsonParam'
        - $ref: '#/components/parameters/LangParam'
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GameActionRequest'
            examples:
              poll:
                summary: Polling (получение текущего состояния)
                value: {}
              send_code:
                summary: Отправка кода уровня
                value:
                  LevelId: 100
                  LevelAction.Answer: "КОД123"
              send_bonus:
                summary: Отправка бонусного кода
                value:
                  LevelId: 100
                  BonusAction.Answer: "БОНУС456"
      responses:
        '200':
          description: Модель игры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameModel'

    get:
      operationId: getGameModelWithParams
      tags: [game]
      summary: Получить модель игры (GET) / запросить штрафную подсказку
      description: |
        Альтернативный метод для получения модели игры.
        Используется для запроса штрафных подсказок (pid + pact).

        Параметры действия передаются через query string.
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
        - name: json
          in: query
          description: JSON-режим (используется для API-вызовов модели игры)
          schema:
            type: integer
            const: 1
        - name: lang
          in: query
          description: Язык ответа
          schema:
            type: string
            default: ru
        - name: pid
          in: query
          description: ID штрафной подсказки
          schema:
            type: integer
        - name: pact
          in: query
          description: Действие с подсказкой (1 = запросить)
          schema:
            type: integer
            enum: [1]
      responses:
        '200':
          description: Модель игры (JSON) или HTML-страница ожидания старта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameModel'
            text/html:
              schema:
                type: string

  /MakeGameFee.aspx:
    get:
      operationId: enterGame
      tags: [game]
      summary: Подать заявку / подтвердить участие в игре
      description: |
        Основной способ регистрации в игре на современных доменах (*.en.cx).
        Используйте `confirm=yes` и `gid` (ID игры). Ответ — HTML (сообщение о принятии заявки и т.п.).
        Требуется активная сессия; при отсутствии авторизации сервер перенаправляет на Login.aspx.
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: confirm
          in: query
          schema:
            type: string
            enum: [yes]
        - $ref: '#/components/parameters/LangParam'
      responses:
        '200':
          description: Результат подачи заявки
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Перенаправление (в т.ч. на Login.aspx без сессии)

  /gameengines/encounter/makefee/Login.aspx:
    post:
      operationId: enterGameLegacy
      tags: [game]
      summary: Войти в игру (legacy makefee)
      description: |
        Устаревший endpoint; на большинстве доменов возвращает HTTP 404.
        Клиент encx использует `/MakeGameFee.aspx` и обращается сюда только как fallback.
        Обнаружен в EN+ v1.2.0.
      parameters:
        - $ref: '#/components/parameters/JsonParam'
        - $ref: '#/components/parameters/LangParam'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                gid:
                  type: integer
                  description: ID игры
      responses:
        '200':
          description: Результат входа в игру
          content:
            text/html:
              schema:
                type: string

  /Teams/TeamDetails.aspx:
    get:
      operationId: getTeamDetails
      tags: [teams]
      summary: Получить детали команды или принять приглашение
      description: |
        Возвращает HTML-страницу с информацией о команде.
        С параметром `action=accept_invitation` принимает приглашение в команду.
        Обнаружен в EN+ v1.2.0.
      parameters:
        - name: tid
          in: query
          required: true
          description: ID команды
          schema:
            type: integer
        - name: action
          in: query
          description: Действие (accept_invitation для принятия приглашения)
          schema:
            type: string
            enum: [accept_invitation]
      responses:
        '200':
          description: HTML-страница с деталями команды
          content:
            text/html:
              schema:
                type: string

  /gamestatistics/full/{gameId}:
    get:
      operationId: getGameStatistics
      tags: [game]
      summary: Получить полную статистику игры
      description: |
        Возвращает JSON с полной статистикой игры: расширенные метаданные,
        результаты по уровням (время прохождения, команды, игроки),
        информацию о уровнях, счётчики игроков и профиль текущего пользователя.

        Обнаружен в EN+ v1.2.0.
      parameters:
        - $ref: '#/components/parameters/GameIdPath'
        - $ref: '#/components/parameters/JsonParam'
      responses:
        '200':
          description: Полная статистика игры
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStatisticsResponse'

  /GameDetails.aspx:
    get:
      operationId: getGameDetails
      tags: [discovery]
      summary: Получить детали и статистику игры
      description: |
        Возвращает HTML-страницу с информацией об игре,
        включая статистику прохождения, список команд и уровней.
        Обнаружен в EN+ v1.2.0.
      parameters:
        - name: gid
          in: query
          required: true
          description: ID игры
          schema:
            type: integer
      responses:
        '200':
          description: HTML-страница с деталями игры
          content:
            text/html:
              schema:
                type: string

  /:
    get:
      operationId: getDomainGames
      tags: [discovery]
      summary: Получить список игр домена
      description: |
        Загружает главную страницу домена и парсит HTML для извлечения списка игр.
        Клиент сначала пробует `m.{domain}`, затем fallback на основной домен `{domain}`.

        **URL:** `https://m.{domain}/` (основной) и `https://{domain}/` (fallback)

        Из HTML извлекаются элементы `h1.gametitle a`:
        - `title` — текст ссылки (название игры)
        - `gameId` — число из атрибута href по паттерну `/details/(\d+)/`
      servers:
        - url: https://m.{domain}
          variables:
            domain:
              default: quest.en.cx
        - url: https://{domain}
          variables:
            domain:
              default: quest.en.cx
        - url: http://m.{domain}
          variables:
            domain:
              default: quest.en.cx
        - url: http://{domain}
          variables:
            domain:
              default: quest.en.cx
      responses:
        '200':
          description: HTML-страница с списком игр
          content:
            text/html:
              schema:
                type: string
                description: |
                  HTML мобильной версии. Парсится клиентом для извлечения
                  списка игр из элементов `h1.gametitle a`.

  /home/:
    get:
      operationId: getGameList
      tags: [discovery]
      summary: Получить список игр (JSON)
      description: |
        Возвращает структурированный JSON-список игр домена с полными метаданными.
        Поддерживает пагинацию через параметр `page`.
      parameters:
        - $ref: '#/components/parameters/JsonParam'
        - name: page
          in: query
          description: Номер страницы для пагинации (1-based)
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Список игр
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameListResponse'

  /NotHumanRequest.aspx:
    get:
      operationId: getAntiSpamChallengePage
      tags: [anti-spam]
      summary: Страница антиспам-проверки
      description: |
        HTML-страница верификации пользователя (anti-spam challenge).
        Клиент может быть редиректнут сюда при подозрении на автоматизированные запросы.
      parameters:
        - name: return
          in: query
          description: Путь возврата после прохождения проверки
          schema:
            type: string
      responses:
        '200':
          description: HTML-страница проверки
          content:
            text/html:
              schema:
                type: string

  /UserDetails.aspx:
    get:
      operationId: getUserProfileHtml
      tags: [admin]
      summary: Профиль пользователя (HTML)
      description: Возвращает HTML-страницу профиля текущего пользователя.
      responses:
        '200':
          description: HTML профиля
          content:
            text/html:
              schema:
                type: string

  /Administration/GamesManager.aspx:
    get:
      operationId: adminGamesManager
      tags: [admin]
      summary: Менеджер игр (список/управляющие действия)
      parameters:
        - name: gid
          in: query
          description: ID игры (для action-запросов)
          schema:
            type: integer
        - name: action
          in: query
          description: Действие менеджера
          schema:
            type: string
            enum: [NotDeliver, Deliver, AwardPoints, EndRatings, CalcIK]
      responses:
        '200':
          description: HTML менеджера игр
          content:
            text/html:
              schema:
                type: string

  /Administration/Games/LevelManager.aspx:
    get:
      operationId: adminLevelManagerGet
      tags: [admin]
      summary: Управление уровнями (GET-действия)
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: levels
          in: query
          schema:
            type: string
            enum: [create, delete, swap, insert, createlike]
        - name: ddlCreateLevelsNum
          in: query
          schema:
            type: integer
        - name: ddlDeleteLevels
          in: query
          schema:
            type: integer
        - name: ddlSwapLevels1
          in: query
          schema:
            type: integer
        - name: ddlSwapLevels2
          in: query
          schema:
            type: integer
        - name: ddlInsertAfterSrc
          in: query
          schema:
            type: integer
        - name: ddlInsertAfterDst
          in: query
          schema:
            type: integer
        - name: ddlCreateLikeLevel
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: HTML страницы управления уровнями
          content:
            text/html:
              schema:
                type: string
    post:
      operationId: adminLevelManagerPost
      tags: [admin]
      summary: Переименование уровней
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level_names
          in: query
          required: true
          schema:
            type: string
            const: update
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        '200':
          description: HTML/redirect после сохранения
          content:
            text/html:
              schema:
                type: string

  /Administration/Games/LevelEditor.aspx:
    get:
      operationId: adminLevelEditorGet
      tags: [admin]
      summary: Чтение/операции с уровнем
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
        - name: swanswers
          in: query
          schema:
            type: integer
            enum: [1]
        - name: editanswers
          in: query
          schema:
            oneOf:
              - type: integer
              - type: string
        - name: delsector
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: HTML редактора уровня
          content:
            text/html:
              schema:
                type: string
    post:
      operationId: adminLevelEditorPost
      tags: [admin]
      summary: Обновление настроек/секторов уровня
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
        - name: swanswers
          in: query
          schema:
            type: integer
            enum: [1]
        - name: editanswers
          in: query
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        '200':
          description: HTML/redirect после сохранения
          content:
            text/html:
              schema:
                type: string

  /Administration/Games/BonusEdit.aspx:
    get:
      operationId: adminBonusEditGet
      tags: [admin]
      summary: Чтение/удаление бонуса
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
        - name: bonus
          in: query
          required: true
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
            enum: [edit, delete]
      responses:
        '200':
          description: HTML формы бонуса
          content:
            text/html:
              schema:
                type: string
    post:
      operationId: adminBonusEditPost
      tags: [admin]
      summary: Создание/обновление бонуса
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
        - name: bonus
          in: query
          required: true
          schema:
            type: integer
        - name: action
          in: query
          required: true
          schema:
            type: string
            const: save
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        '200':
          description: HTML/redirect после сохранения
          content:
            text/html:
              schema:
                type: string

  /Administration/Games/PromptEdit.aspx:
    get:
      operationId: adminPromptEditGet
      tags: [admin]
      summary: Чтение/удаление подсказки
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
        - name: prid
          in: query
          schema:
            type: integer
        - name: penalty
          in: query
          schema:
            type: integer
            enum: [1]
        - name: action
          in: query
          schema:
            type: string
            enum: [PromptEdit, PromptDelete]
      responses:
        '200':
          description: HTML формы подсказки
          content:
            text/html:
              schema:
                type: string
    post:
      operationId: adminPromptEditPost
      tags: [admin]
      summary: Создание/обновление подсказки
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
        - name: prid
          in: query
          schema:
            type: integer
        - name: penalty
          in: query
          schema:
            type: integer
            enum: [1]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        '200':
          description: HTML/redirect после сохранения
          content:
            text/html:
              schema:
                type: string

  /Administration/Games/TaskEdit.aspx:
    get:
      operationId: adminTaskEditGet
      tags: [admin]
      summary: Чтение/удаление задания, список команд
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
        - name: tid
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
            enum: [TaskEdit, TaskDelete]
      responses:
        '200':
          description: HTML страницы заданий
          content:
            text/html:
              schema:
                type: string
    post:
      operationId: adminTaskEditPost
      tags: [admin]
      summary: Создание/обновление задания
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
        - name: tid
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
            enum: [TaskEdit]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        '200':
          description: HTML/redirect после сохранения
          content:
            text/html:
              schema:
                type: string

  /Administration/Games/NameCommentEdit.aspx:
    get:
      operationId: adminNameCommentGet
      tags: [admin]
      summary: Чтение названия/комментария уровня
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: HTML формы названия/комментария
          content:
            text/html:
              schema:
                type: string
    post:
      operationId: adminNameCommentPost
      tags: [admin]
      summary: Обновление названия/комментария уровня
      parameters:
        - name: gid
          in: query
          required: true
          schema:
            type: integer
        - name: level
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        '200':
          description: HTML/redirect после сохранения
          content:
